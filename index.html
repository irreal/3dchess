<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Chess</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: system-ui, sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        cursor: pointer;
        user-select: none;
        z-index: 10;
      }

      #overlay.hidden {
        display: none;
      }

      #overlay h1 {
        font-size: 2rem;
        font-weight: 600;
      }

      #overlay p {
        color: #bbb;
      }

      #hud {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 20px;
        border-radius: 999px;
        background: rgba(20, 24, 28, 0.75);
        color: #fff;
        font-size: 15px;
        letter-spacing: 0.02em;
        pointer-events: none;
        z-index: 5;
      }

      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 6px;
        margin: -3px 0 0 -3px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.8);
        pointer-events: none;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">White to move</div>
    <div id="crosshair"></div>
    <div id="overlay">
      <h1>3D Chess</h1>
      <p>Click to play</p>
      <p>WASD — move &nbsp;·&nbsp; Mouse — look &nbsp;·&nbsp; Shift — run &nbsp;·&nbsp; Esc — release cursor</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
